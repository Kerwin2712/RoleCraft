{% extends "base.html" %}

{% block content %}
<div class="glass-panel w-full max-w-md p-8 rounded-2xl neon-border mt-16">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">Unirse a <span class="text-neon">RoleCraft</span></h1>
        <p class="text-gray-400">Regístrate como un nuevo Aprendiz</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg mb-6">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/register" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Usuario</label>
            <input type="text" name="username" required
                class="w-full bg-black/40 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[var(--accent-color)] focus:ring-1 focus:ring-[var(--accent-color)] transition-colors">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Correo Electrónico</label>
            <input type="email" name="email" required
                class="w-full bg-black/40 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[var(--accent-color)] focus:ring-1 focus:ring-[var(--accent-color)] transition-colors">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
            <input type="password" name="password" required
                class="w-full bg-black/40 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[var(--secondary-color)] focus:ring-1 focus:ring-[var(--secondary-color)] transition-colors">
        </div>

        <button type="submit"
            class="w-full py-3 px-4 bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary-color)] text-[var(--bg-color)] font-extrabold rounded-lg hover:opacity-90 transition-opacity shadow-[0_0_15px_var(--glow-effect)]">
            Desplegar Configuración
        </button>
    </form>

    <div class="mt-6 text-center text-gray-400 text-sm">
        ¿Ya tienes acceso?
        <a href="{{ url_for('login') }}" class="text-neonBlue hover:text-neonPurple transition-colors">Vuelve a
            Ingresar</a>
    </div>
</div>
{% endblock %}
