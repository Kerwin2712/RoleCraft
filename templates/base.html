<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoleCraft - Dashboard</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neonBlue: '#00f3ff',
                        neonPurple: '#bc13fe',
                        darkBg: '#0a0a0f',
                        glassBg: 'rgba(20, 20, 30, 0.6)',
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Highlight.js (Atom-One-Dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            /* Futuristic (Default) */
            --bg-color: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-header: #ffffff;
            --accent-color: #00f3ff;
            --secondary-color: #bc13fe;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        .theme-light {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-muted: #475569;
            --text-header: #0f172a;
            --accent-color: #2563eb;
            --secondary-color: #7c3aed;
            --border-color: rgba(0, 0, 0, 0.15);
        }

        .theme-warm {
            --bg-color: #1c1917;
            --card-bg: rgba(41, 37, 36, 0.7);
            --text-main: #f5f5f4;
            --text-muted: #a8a29e;
            --text-header: #ffffff;
            --accent-color: #f97316;
            --secondary-color: #78350f;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        .theme-cold {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --text-header: #ffffff;
            --accent-color: #22d3ee;
            --secondary-color: #1e40af;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* Automagic glow and soft colors using color-mix */
        :root, body {
            --glow-effect: color-mix(in srgb, var(--accent-color), transparent 85%);
            --accent-soft: color-mix(in srgb, var(--accent-color), transparent 90%);
            --accent-border: color-mix(in srgb, var(--accent-color), transparent 70%);
            --secondary-glow: color-mix(in srgb, var(--secondary-color), transparent 40%);
            --secondary-soft: color-mix(in srgb, var(--secondary-color), transparent 90%);
            --secondary-border: color-mix(in srgb, var(--secondary-color), transparent 70%);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image:
                radial-gradient(circle at 15% 50%, var(--glow-effect), transparent 25%),
                radial-gradient(circle at 85% 30%, var(--glow-effect), transparent 25%);
            background-attachment: fixed;
            min-height: 100vh;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-border {
            border: 1px solid transparent;
            background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box,
                linear-gradient(45deg, var(--accent-color), var(--secondary-color)) border-box;
        }

        .text-neon {
            background: -webkit-linear-gradient(45deg, var(--accent-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glassmorphism Modal */
        .modal-glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 40px var(--glow-effect);
        }

        .neon-icon {
            text-shadow: 0 0 10px var(--accent-color);
            color: var(--accent-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .neon-icon:hover {
            transform: scale(1.2);
            text-shadow: 0 0 20px var(--secondary-color);
            color: var(--secondary-color);
        }

        /* Special dynamic utilities */
        .bg-accent-soft { background-color: var(--accent-soft) !important; }
        .border-accent-soft { border-color: var(--accent-border) !important; }
        .bg-secondary-soft { background-color: var(--secondary-soft) !important; }
        .border-secondary-soft { border-color: var(--secondary-border) !important; }
        .shadow-accent { box-shadow: 0 0 15px var(--glow-effect); }
        .shadow-secondary { box-shadow: 0 0 10px var(--secondary-glow); }

        .text-muted { color: var(--text-muted) !important; }

        @keyframes floatXP {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .xp-float {
            position: fixed;
            color: var(--accent-color);
            font-weight: 900;
            pointer-events: none;
            z-index: 9999;
            animation: floatXP 2s ease-out forwards;
        }

        /* Floating Action Button */

        /* Floating Action Button */
        #themeFAB {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-color);
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-color);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .fab-btn:hover {
            transform: scale(1.1) rotate(45deg);
        }

        .theme-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 200px;
            padding: 1rem;
            border-radius: 1rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-option {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-gray-800">
        <div class="text-2xl font-bold tracking-wider text-neon">ROLECRAFT</div>
        <div>
            {% if user %}
            <span class="text-muted">Logueado como: <span class="text-[var(--text-header)] font-bold">{{ user.username }}</span></span>
            <a href="{{ url_for('logout') }}"
                class="px-4 py-2 rounded-md bg-red-600/20 text-red-400 hover:bg-red-600/40 border border-red-500/30 transition-colors duration-300">Salir</a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow p-6 flex justify-center items-start">
        {% block content %}{% endblock %}
    </main>

    <!-- Theme Selector FAB -->
    <div id="themeFAB">
        <div class="theme-menu glass-panel" id="themeMenu">
            <div class="text-xs font-bold uppercase text-gray-500 mb-2 border-b border-gray-700/50 pb-1">Seleccionar Tema</div>
            <div class="theme-option" onclick="applyTheme('futuristic')">
                <div class="color-dot bg-[#00f3ff]"></div> Futuristic
            </div>
            <div class="theme-option" onclick="applyTheme('light')">
                <div class="color-dot bg-[#3b82f6]"></div> Light Mode
            </div>
            <div class="theme-option" onclick="applyTheme('warm')">
                <div class="color-dot bg-[#f97316]"></div> Desert Warm
            </div>
            <div class="theme-option" onclick="applyTheme('cold')">
                <div class="color-dot bg-[#22d3ee]"></div> Polar Cold
            </div>
            <div class="text-xs font-bold uppercase text-gray-500 mt-4 mb-2 border-b border-gray-700/50 pb-1">Color de Acento</div>
            <div class="flex gap-2 p-1">
                <div class="w-6 h-6 rounded-full bg-red-500 cursor-pointer border border-white/20" onclick="setAccent('#ef4444')"></div>
                <div class="w-6 h-6 rounded-full bg-green-500 cursor-pointer border border-white/20" onclick="setAccent('#22c55e')"></div>
                <div class="w-6 h-6 rounded-full bg-yellow-500 cursor-pointer border border-white/20" onclick="setAccent('#eab308')"></div>
                <div class="w-6 h-6 rounded-full bg-pink-500 cursor-pointer border border-white/20" onclick="setAccent('#ec4899')"></div>
            </div>
        </div>
        <div class="fab-btn" onclick="toggleThemeMenu()">
            <i class="fa-solid fa-palette text-xl"></i>
        </div>
    </div>

    <script>
        function toggleThemeMenu() {
            const menu = document.getElementById('themeMenu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function applyTheme(theme) {
            document.body.className = 'antialiased min-h-screen flex flex-col';
            if (theme !== 'futuristic') {
                document.body.classList.add('theme-' + theme);
            }
            localStorage.setItem('rolecraft-theme', theme);
            
            // Re-apply current accent if it exists, to override the theme default
            const savedAccent = localStorage.getItem('rolecraft-accent');
            if (savedAccent) {
                setAccent(savedAccent);
            }
        }

        function setAccent(color) {
            document.body.style.setProperty('--accent-color', color);
            // Also update glow effect to match if possible, or just keep accent
            localStorage.setItem('rolecraft-accent', color);
        }

        // Load saved preferences
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('rolecraft-theme') || 'futuristic';
            const savedAccent = localStorage.getItem('rolecraft-accent');
            
            applyTheme(savedTheme);
            if (savedAccent) setAccent(savedAccent);
        });

        // Close menu when clicking outside
        window.addEventListener('click', (e) => {
            const fab = document.getElementById('themeFAB');
            const menu = document.getElementById('themeMenu');
            if (menu.style.display === 'flex' && !fab.contains(e.target)) {
                menu.style.display = 'none';
            }
        });
    </script>
</body>

</html>
