{% extends "base.html" %}

{% block content %}
<div class="glass-panel w-full max-w-md p-8 rounded-2xl neon-border mt-16">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2 text-[var(--text-header)]">Ingresar a <span class="text-neon">RoleCraft</span></h1>
        <p class="text-muted">Inicia sesión como Aprendiz o Experto</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg mb-6">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Usuario</label>
            <input type="text" name="username" required
                class="w-full bg-black/40 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[var(--accent-color)] focus:ring-1 focus:ring-[var(--accent-color)] transition-colors">
        </div>

        <div>
            <label class="block text-sm font-medium text-muted mb-2">Contraseña</label>
            <input type="password" name="password" required
                class="w-full bg-black/40 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[var(--secondary-color)] focus:ring-1 focus:ring-[var(--secondary-color)] transition-colors">
        </div>

        <button type="submit"
            class="w-full py-3 px-4 bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary-color)] text-[var(--bg-color)] font-extrabold rounded-lg hover:opacity-90 transition-opacity flex justify-center items-center shadow-[0_0_15px_var(--glow-effect)]">
            Acceder a la Red
        </button>
    </form>

    <div class="mt-6 text-center text-muted text-sm">
        ¿Aún no eres un Aprendiz?
        <a href="{{ url_for('register') }}" class="text-[var(--accent-color)] hover:text-[var(--secondary-color)] transition-colors font-bold">Regístrate
            aquí</a>
    </div>
</div>
{% endblock %}
